name: Deploy Finance API (MonsterASP)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Finance.Api/Finance.Api.csproj

      - name: Build project
        run: dotnet build src/Finance.Api/Finance.Api.csproj --configuration Release --no-restore

      - name: Publish project
        run: dotnet publish src/Finance.Api/Finance.Api.csproj -c Release -o publish

      - name: Deploy to MonsterASP via WebDeploy
        shell: pwsh
        env:
          WEBDEPLOY_PUBLISH_URL: ${{ secrets.WEBDEPLOY_PUBLISH_URL }}
          WEBDEPLOY_SITE: ${{ secrets.WEBDEPLOY_SITE }}
          WEBDEPLOY_USERNAME: ${{ secrets.WEBDEPLOY_USERNAME }}
          WEBDEPLOY_PASSWORD: ${{ secrets.WEBDEPLOY_PASSWORD }}
        run: |

          Write-Host "Starting WebDeploy..."

          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"

          if (!(Test-Path $msdeploy)) {
              Write-Error "msdeploy not found!"
              exit 1
          }

          $computerName = "https://$env:WEBDEPLOY_PUBLISH_URL`:8172/msdeploy.axd?site=$env:WEBDEPLOY_SITE"

          $dest = "contentPath=$env:WEBDEPLOY_SITE,computerName=$computerName,userName=$env:WEBDEPLOY_USERNAME,password=$env:WEBDEPLOY_PASSWORD,authType=Basic"

          & $msdeploy `
            -verb:sync `
            -source:contentPath="publish" `
            -dest:$dest `
            -allowUntrusted `
            -enableRule:AppOffline

          if ($LASTEXITCODE -ne 0) {
              Write-Error "Deploy failed"
              exit $LASTEXITCODE
          }

          Write-Host "Deploy finished successfully!"
