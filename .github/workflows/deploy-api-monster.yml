name: Deploy Finance API (MonsterASP)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-api-monster.yml'
      - 'FinanceApp.slnx'
      - 'src/Finance.Api/**'
      - 'src/Finance.Application/**'
      - 'src/Finance.Domain/**'
      - 'src/Finance.Infrastructure/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest
    env:
      FINANCE_DB_CONNECTION: ${{ secrets.FINANCE_DB_CONNECTION }}
      ConnectionStrings__FinanceDb: ${{ secrets.FINANCE_DB_CONNECTION }}
      Jwt__Key: ${{ secrets.JWT_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Restore projects for migrations
        run: |
          dotnet restore src/Finance.Infrastructure/Finance.Infrastructure.csproj
          dotnet restore src/Finance.Api/Finance.Api.csproj

      - name: Apply migrations before deploy
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not $env:FINANCE_DB_CONNECTION) {
            throw "FINANCE_DB_CONNECTION secret is not configured."
          }

          if (-not $env:Jwt__Key) {
            throw "JWT_KEY secret is not configured."
          }

          $migrationsBeforeUpdate = dotnet ef migrations list `
            --project src/Finance.Infrastructure/Finance.Infrastructure.csproj `
            --startup-project src/Finance.Api/Finance.Api.csproj `
            --context AppDbContext `
            --connection "$env:FINANCE_DB_CONNECTION"

          if ($LASTEXITCODE -ne 0) {
            throw "'dotnet ef migrations list' failed before database update with exit code $LASTEXITCODE."
          }

          Write-Host "Migrations before database update:"
          Write-Host $migrationsBeforeUpdate

          $pendingMigrationsBeforeUpdate = @($migrationsBeforeUpdate | Where-Object { $_ -match '\(Pending\)' })
          if ($pendingMigrationsBeforeUpdate.Count -eq 0) {
            Write-Host "No pending migrations reported before update. Running 'dotnet ef database update' anyway to keep the target database synchronized."
          }
          else {
            Write-Host "Pending migrations detected before update: $($pendingMigrationsBeforeUpdate -join '; ')"
          }

          dotnet ef database update `
            --project src/Finance.Infrastructure/Finance.Infrastructure.csproj `
            --startup-project src/Finance.Api/Finance.Api.csproj `
            --context AppDbContext `
            --connection "$env:FINANCE_DB_CONNECTION"

          if ($LASTEXITCODE -ne 0) {
            throw "'dotnet ef database update' failed with exit code $LASTEXITCODE."
          }

      - name: Validate no pending migrations after update
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not $env:FINANCE_DB_CONNECTION) {
            throw "FINANCE_DB_CONNECTION secret is not configured."
          }

          if (-not $env:Jwt__Key) {
            throw "JWT_KEY secret is not configured."
          }

          $migrationsOutput = dotnet ef migrations list `
            --project src/Finance.Infrastructure/Finance.Infrastructure.csproj `
            --startup-project src/Finance.Api/Finance.Api.csproj `
            --context AppDbContext `
            --connection "$env:FINANCE_DB_CONNECTION"

          if ($LASTEXITCODE -ne 0) {
            throw "'dotnet ef migrations list' failed with exit code $LASTEXITCODE."
          }

          Write-Host $migrationsOutput

          $pendingMigrations = $migrationsOutput | Where-Object { $_ -match '\(Pending\)' }
          if ($pendingMigrations) {
            throw "There are pending migrations after 'dotnet ef database update': $($pendingMigrations -join '; ')"
          }

          Write-Host "No pending migrations detected after database update."

      - name: Reconcile missing migrations in database history
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not $env:FINANCE_DB_CONNECTION) {
            throw "FINANCE_DB_CONNECTION secret is not configured."
          }

          if (-not $env:Jwt__Key) {
            throw "JWT_KEY secret is not configured."
          }

          function Get-DatabaseMigrations {
            $dbMigrations = @()
            $connection = New-Object System.Data.SqlClient.SqlConnection($env:FINANCE_DB_CONNECTION)

            try {
              $connection.Open()
              $command = $connection.CreateCommand()
              $command.CommandText = "SELECT MigrationId FROM __EFMigrationsHistory ORDER BY MigrationId"
              $reader = $command.ExecuteReader()

              while ($reader.Read()) {
                if (-not $reader.IsDBNull(0)) {
                  $dbMigrations += $reader.GetString(0)
                }
              }

              $reader.Close()
            }
            finally {
              $connection.Close()
            }

            return @($dbMigrations)
          }

          function Get-HistoryProductVersion {
            $connection = New-Object System.Data.SqlClient.SqlConnection($env:FINANCE_DB_CONNECTION)

            try {
              $connection.Open()
              $command = $connection.CreateCommand()
              $command.CommandText = "SELECT TOP 1 ProductVersion FROM __EFMigrationsHistory ORDER BY MigrationId DESC"
              $result = $command.ExecuteScalar()

              if ($null -eq $result -or [string]::IsNullOrWhiteSpace($result.ToString())) {
                return '10.0.2'
              }

              return $result.ToString()
            }
            finally {
              $connection.Close()
            }
          }

          function Test-AccountTypeMigrationSchemaPresent {
            $connection = New-Object System.Data.SqlClient.SqlConnection($env:FINANCE_DB_CONNECTION)

            try {
              $connection.Open()
              $command = $connection.CreateCommand()
              $command.CommandText = "SELECT CASE WHEN COL_LENGTH('dbo.Accounts', 'Type') IS NOT NULL AND COL_LENGTH('dbo.Accounts', 'ParentAccountId') IS NOT NULL AND EXISTS (SELECT 1 FROM sys.indexes WHERE name = 'IX_Accounts_ParentAccountId' AND object_id = OBJECT_ID(N'dbo.Accounts')) AND EXISTS (SELECT 1 FROM sys.foreign_keys WHERE name = 'FK_Accounts_Accounts_ParentAccountId' AND parent_object_id = OBJECT_ID(N'dbo.Accounts')) THEN 1 ELSE 0 END"
              return [int]$command.ExecuteScalar() -eq 1
            }
            finally {
              $connection.Close()
            }
          }

          function Add-MigrationHistoryEntry {
            param(
              [string]$MigrationId,
              [string]$ProductVersion
            )

            $connection = New-Object System.Data.SqlClient.SqlConnection($env:FINANCE_DB_CONNECTION)

            try {
              $connection.Open()
              $command = $connection.CreateCommand()
              $command.CommandText = "INSERT INTO __EFMigrationsHistory (MigrationId, ProductVersion) VALUES (@migrationId, @productVersion)"
              $null = $command.Parameters.Add("@migrationId", [System.Data.SqlDbType]::NVarChar, 150)
              $command.Parameters["@migrationId"].Value = $MigrationId
              $null = $command.Parameters.Add("@productVersion", [System.Data.SqlDbType]::NVarChar, 32)
              $command.Parameters["@productVersion"].Value = $ProductVersion
              $null = $command.ExecuteNonQuery()
            }
            finally {
              $connection.Close()
            }
          }

          $localMigrations = Get-ChildItem -Path 'src/Finance.Infrastructure/Migrations' -Filter '*.cs' |
            Where-Object { $_.Name -notlike '*.Designer.cs' -and $_.BaseName -ne 'AppDbContextModelSnapshot' } |
            Sort-Object Name |
            ForEach-Object { $_.BaseName }

          if ($localMigrations.Count -eq 0) {
            throw "No local migrations were found in src/Finance.Infrastructure/Migrations."
          }

          $dbMigrations = Get-DatabaseMigrations
          Write-Host "Migrations stored in __EFMigrationsHistory before reconciliation:"
          if ($dbMigrations.Count -eq 0) {
            Write-Host "(none)"
          }
          else {
            $dbMigrations | ForEach-Object { Write-Host " - $_" }
          }

          $missingMigrations = @($localMigrations | Where-Object { $_ -notin $dbMigrations })
          if ($missingMigrations.Count -eq 0) {
            Write-Host "Database history already contains all local migrations."
          }
          else {
            Write-Host "Migrations missing from __EFMigrationsHistory: $($missingMigrations -join ', ')"

            foreach ($migration in $missingMigrations) {
              if ($migration -eq '20260322110000_AddAccountTypeAndParentAccount' -and (Test-AccountTypeMigrationSchemaPresent)) {
                $productVersion = Get-HistoryProductVersion
                Write-Host "Schema for '$migration' already exists. Recording migration in __EFMigrationsHistory with ProductVersion '$productVersion'."
                Add-MigrationHistoryEntry -MigrationId $migration -ProductVersion $productVersion
                continue
              }

              Write-Host "Applying missing migration target '$migration'..."

              dotnet ef database update $migration `
                --project src/Finance.Infrastructure/Finance.Infrastructure.csproj `
                --startup-project src/Finance.Api/Finance.Api.csproj `
                --context AppDbContext `
                --connection "$env:FINANCE_DB_CONNECTION"

              if ($LASTEXITCODE -ne 0) {
                throw "'dotnet ef database update $migration' failed with exit code $LASTEXITCODE."
              }
            }
          }

          $dbMigrationsAfterReconciliation = Get-DatabaseMigrations
          Write-Host "Migrations stored in __EFMigrationsHistory after reconciliation:"
          if ($dbMigrationsAfterReconciliation.Count -eq 0) {
            Write-Host "(none)"
          }
          else {
            $dbMigrationsAfterReconciliation | ForEach-Object { Write-Host " - $_" }
          }

          $remainingMissingMigrations = @($localMigrations | Where-Object { $_ -notin $dbMigrationsAfterReconciliation })
          if ($remainingMissingMigrations.Count -gt 0) {
            Write-Warning "The following migrations are still missing from __EFMigrationsHistory after reconciliation: $($remainingMissingMigrations -join ', ')"
          }
          else {
            Write-Host "Database history is synchronized with local migrations."
          }

      - name: Restore
        run: dotnet restore src/Finance.Api/Finance.Api.csproj

      - name: Build
        run: dotnet build src/Finance.Api/Finance.Api.csproj -c Release --no-restore

      - name: Deploy using publish profile
        env:
          WEBDEPLOY_PASSWORD: ${{ secrets.WEBDEPLOY_PASSWORD }}
        run: |
          dotnet publish src/Finance.Api/Finance.Api.csproj `
            -c Release `
            /p:PublishProfile=site55699-WebDeploy `
            /p:Password=$env:WEBDEPLOY_PASSWORD
