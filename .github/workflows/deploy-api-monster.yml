name: Deploy Finance API (MonsterASP)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect new migrations
        id: migration_changes
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "run_migrations=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "workflow_dispatch: migrations will run."
            exit 0
          }

          $beforeSha = "${{ github.event.before }}"
          $currentSha = "${{ github.sha }}"

          if ($beforeSha -and $beforeSha -ne "0000000000000000000000000000000000000000") {
            Write-Host "Comparing changes from $beforeSha to $currentSha"
            $changedFiles = git diff --name-only $beforeSha $currentSha
          }
          elseif (git rev-parse --verify --quiet "HEAD^") {
            Write-Host "'before' sha is unavailable. Falling back to HEAD^..HEAD comparison."
            $changedFiles = git diff --name-only HEAD^ HEAD
          }
          else {
            Write-Host "Repository has a single commit. Running migrations to keep database in sync."
            "run_migrations=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $hasMigrations = $changedFiles | Where-Object { $_ -like 'src/Finance.Infrastructure/Migrations/*' }

          if ($hasMigrations) {
            "run_migrations=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "New migration files detected."
          }
          else {
            "run_migrations=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "No migration changes detected."
          }

      - name: Install dotnet-ef
        if: steps.migration_changes.outputs.run_migrations == 'true'
        run: dotnet tool install --global dotnet-ef

      - name: Restore projects for migrations
        if: steps.migration_changes.outputs.run_migrations == 'true'
        run: |
          dotnet restore src/Finance.Infrastructure/Finance.Infrastructure.csproj
          dotnet restore src/Finance.Api/Finance.Api.csproj

      - name: Apply migrations
        if: steps.migration_changes.outputs.run_migrations == 'true'
        shell: pwsh
        env:
          FINANCE_DB_CONNECTION: ${{ secrets.FINANCE_DB_CONNECTION || secrets.FINANCE_DB_CONNETION }}
        run: |
          if (-not $env:FINANCE_DB_CONNECTION) {
            Write-Host "FINANCE_DB_CONNECTION/FINANCE_DB_CONNETION secret is not configured. Skipping migration update."
            exit 0
          }

          dotnet ef database update `
            --project src/Finance.Infrastructure/Finance.Infrastructure.csproj `
            --startup-project src/Finance.Api/Finance.Api.csproj `
            --context AppDbContext `
            --connection "$env:FINANCE_DB_CONNECTION"


      - name: Validate latest migration in EF history
        if: steps.migration_changes.outputs.run_migrations == 'true'
        shell: pwsh
        env:
          FINANCE_DB_CONNECTION: ${{ secrets.FINANCE_DB_CONNECTION || secrets.FINANCE_DB_CONNETION }}
        run: |
          if (-not $env:FINANCE_DB_CONNECTION) {
            Write-Host "FINANCE_DB_CONNECTION/FINANCE_DB_CONNETION secret is not configured. Skipping EF history validation."
            exit 0
          }

          $migrationFiles = Get-ChildItem "src/Finance.Infrastructure/Migrations" -Filter "*.cs" |
            Where-Object { $_.Name -notlike "*Designer.cs" -and $_.Name -notlike "*ModelSnapshot.cs" } |
            Sort-Object Name

          if (-not $migrationFiles) {
            throw "No migration files found in src/Finance.Infrastructure/Migrations."
          }

          $latestMigrationId = [System.IO.Path]::GetFileNameWithoutExtension($migrationFiles[-1].Name)
          Write-Host "Latest migration in repository: $latestMigrationId"

          $connection = New-Object System.Data.SqlClient.SqlConnection($env:FINANCE_DB_CONNECTION)
          try {
            $connection.Open()
            $command = $connection.CreateCommand()
            $command.CommandText = "SELECT COUNT(1) FROM [__EFMigrationsHistory] WHERE [MigrationId] = @MigrationId"
            [void]$command.Parameters.Add("@MigrationId", [System.Data.SqlDbType]::NVarChar, 150)
            $command.Parameters["@MigrationId"].Value = $latestMigrationId

            $count = [int]$command.ExecuteScalar()
            if ($count -lt 1) {
              throw "Migration '$latestMigrationId' was not found in __EFMigrationsHistory after database update."
            }

            Write-Host "Migration '$latestMigrationId' confirmed in __EFMigrationsHistory."
          }
          finally {
            if ($connection.State -ne [System.Data.ConnectionState]::Closed) {
              $connection.Close()
            }
          }

      - name: Restore
        run: dotnet restore src/Finance.Api/Finance.Api.csproj

      - name: Build
        run: dotnet build src/Finance.Api/Finance.Api.csproj -c Release --no-restore

      - name: Deploy using publish profile
        env:
          WEBDEPLOY_PASSWORD: ${{ secrets.WEBDEPLOY_PASSWORD }}
        run: |
          dotnet publish src/Finance.Api/Finance.Api.csproj `
            -c Release `
            /p:PublishProfile=site55699-WebDeploy `
            /p:Password=$env:WEBDEPLOY_PASSWORD
