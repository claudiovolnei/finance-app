name: Deploy Finance API (MonsterASP)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: windows-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Detect new migrations
        id: migration_changes
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "run_migrations=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "workflow_dispatch: migrations will run."
            exit 0
          }

          if (git rev-parse --verify --quiet "HEAD^") {
            $changedFiles = git diff --name-only HEAD^ HEAD
          }
          else {
            Write-Host "Repository has a single commit. Running migrations to keep database in sync."
            "run_migrations=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            exit 0
          }

          $hasMigrations = $changedFiles | Where-Object { $_ -like 'src/Finance.Infrastructure/Migrations/*' }

          if ($hasMigrations) {
            "run_migrations=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "New migration files detected."
          }
          else {
            "run_migrations=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "No migration changes detected."
          }

      - name: Install dotnet-ef
        if: steps.migration_changes.outputs.run_migrations == 'true'
        run: dotnet tool install --global dotnet-ef

      - name: Restore projects for migrations
        if: steps.migration_changes.outputs.run_migrations == 'true'
        run: |
          dotnet restore src/Finance.Infrastructure/Finance.Infrastructure.csproj
          dotnet restore src/Finance.Api/Finance.Api.csproj

      - name: Apply migrations
        if: steps.migration_changes.outputs.run_migrations == 'true'
        shell: pwsh
        env:
          FINANCE_DB_CONNECTION: ${{ secrets.FINANCE_DB_CONNECTION || secrets.FINANCE_DB_CONNETION }}
        run: |
          if (-not $env:FINANCE_DB_CONNECTION) {
            Write-Host "FINANCE_DB_CONNECTION/FINANCE_DB_CONNETION secret is not configured. Skipping migration update."
            exit 0
          }

          dotnet ef database update `
            --project src/Finance.Infrastructure/Finance.Infrastructure.csproj `
            --startup-project src/Finance.Api/Finance.Api.csproj `
            --context AppDbContext `
            --connection "$env:FINANCE_DB_CONNECTION"

      - name: Restore
        run: dotnet restore src/Finance.Api/Finance.Api.csproj

      - name: Build
        run: dotnet build src/Finance.Api/Finance.Api.csproj -c Release --no-restore

      - name: Deploy using publish profile
        env:
          WEBDEPLOY_PASSWORD: ${{ secrets.WEBDEPLOY_PASSWORD }}
        run: |
          dotnet publish src/Finance.Api/Finance.Api.csproj `
            -c Release `
            /p:PublishProfile=site55699-WebDeploy `
            /p:Password=$env:WEBDEPLOY_PASSWORD
